framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        routing:
            'App\Ticket\Infrastructure\Messenger\Message\TicketCreatedMessage': async
            'App\Ticket\Infrastructure\Messenger\Message\TicketAssignedMessage': async
            'App\Ticket\Infrastructure\Messenger\Message\TicketStatusChangedMessage': async
            'App\Ticket\Infrastructure\Messenger\Message\CommentAddedMessage': async
            'App\Ticket\Infrastructure\Messenger\Message\SlaViolatedMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
