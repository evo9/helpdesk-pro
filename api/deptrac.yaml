deptrac:
    paths:
        - src

    layers:
        -   name: Domain
            collectors:
                -   type: classNameRegex
                    value: '#App\\[^\\]+\\Domain\\#'
        -   name: Application
            collectors:
                -   type: classNameRegex
                    value: '#App\\[^\\]+\\Application\\#'
        -   name: Infrastructure
            collectors:
                -   type: classNameRegex
                    value: '#App\\[^\\]+\\Infrastructure\\#'

    ruleset:
        Domain: ~
        Application:
            - Domain
        Infrastructure:
            - Application
            - Domain

    formatters:
        graphviz:
            groups:
                Domain:
                    - Domain
                Application:
                    - Application
                Infrastructure:
                    - Infrastructure
