# Автоматически подхватывается Docker Compose в dev.
# НЕ коммитить в продакшн-ветку.

services:
  php:
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: "client_host=host.docker.internal"
      PHP_IDE_CONFIG: "serverName=helpdesk-pro"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  messenger:
    environment:
      XDEBUG_MODE: "off"

  scheduler:
    environment:
      XDEBUG_MODE: "off"